name: Bug Report
description: Report a bug in Morsl
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Morsl version
      description: Docker image tag or commit hash
      placeholder: "v0.1.0 or ghcr.io/featurecreep-cron/morsl:latest"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker (amd64)
        - Docker (arm64)
        - Bare metal
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure profile with ...
        2. Generate menu
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be formatted as code.
      render: shell
